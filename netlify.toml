[build]
  command = "CI=false npm run build"
  publish = "build"

[dev]
  command = "npm start"
  port = 8888
  targetPort = 3000


[[redirects]]

  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Embedder-Policy = "unsafe-none"
